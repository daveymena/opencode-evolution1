version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Sesiones, historial, base de datos de opencode
      - opencode_data:/root/.local/share/opencode
      # Archivos de código que opencode genera/edita
      - opencode_workspace:/root/workspace
    restart: unless-stopped

volumes:
  opencode_data:
  opencode_workspace:
